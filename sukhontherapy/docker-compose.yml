services:
  db:
    image: postgres:16-alpine
    container_name: sukhon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sukhontherapy
      POSTGRES_USER: spa_user
      POSTGRES_PASSWORD: spa_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spa_user -d sukhontherapy"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sukhon_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://spa_user:spa_pass@db:5432/sukhontherapy
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: sukhon_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      # Uncomment for HTTPS (requires cert setup):
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro   # For SSL

volumes:
  pgdata:
